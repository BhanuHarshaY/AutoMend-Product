[alembic]
script_location = alembic
# Prepend the directory containing alembic.ini (i.e. /app in the Dockerfile
# image) to sys.path so env.py can do `from app.config import get_settings`
# without external PYTHONPATH wiring. Dockerfile.api installs deps before
# copying sources so the `app` package isn't registered as a module.
prepend_sys_path = .
sqlalchemy.url = postgresql://automend:automend@localhost:5432/automend

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
