{{- /*
  External Secrets Operator glue. When `externalSecrets.enabled` is true,
  this template emits:
    1. A ClusterSecretStore pointing at GCP Secret Manager.
    2. An ExternalSecret that pulls every AUTOMEND_* credential from Secret
       Manager entries (created by Terraform modules cloud-sql / memorystore
       / app-secrets) and materializes them into a k8s Secret named
       `automend-secrets` — same name the Deployments' envFrom references.

  Workload Identity: the ClusterSecretStore auth mode `workloadIdentity`
  means ESO uses the k8s SA annotation `iam.gke.io/gcp-service-account` to
  impersonate a GCP SA. Terraform's external-secrets module annotates
  `external-secrets/external-secrets` with the app SA email; the app SA
  has `secretmanager.secretAccessor` on every secret referenced below.

  Pre-reqs (all provisioned by `terraform apply` when
  `var.enable_external_secrets = true`):
    - External Secrets Operator installed in the `external-secrets` namespace
    - App GCP SA with accessor perms on every secret
    - WI binding from `external-secrets/external-secrets` → app SA
    - Each secret created in GCP Secret Manager
*/ -}}
{{- $es := (.Values.externalSecrets | default dict) -}}
{{- if $es.enabled -}}
{{- $prefix := .Values.externalSecrets.secretPrefix | required "externalSecrets.secretPrefix is required when externalSecrets.enabled=true — set to the Terraform `app_secrets_prefix` output (usually `${name_prefix}-${env}`)." -}}
{{- $cloudsqlPasswordSecret := .Values.externalSecrets.cloudSqlPasswordSecret | required "externalSecrets.cloudSqlPasswordSecret is required — set to the Terraform `cloudsql_db_password_secret_id` output (the short name, not the resource path)." -}}
{{- $redisAuthSecret := .Values.externalSecrets.redisAuthSecret | required "externalSecrets.redisAuthSecret is required — set to the Terraform `memorystore_auth_secret_id` output (the short name)." -}}
{{- $project := .Values.externalSecrets.projectId | required "externalSecrets.projectId is required — set to the GCP project id hosting the Secret Manager entries." -}}
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: {{ include "automend.fullname" . }}-gcpsm
  labels:
    {{- include "automend.labels" . | nindent 4 }}
spec:
  provider:
    gcpsm:
      projectID: {{ $project | quote }}
      auth:
        workloadIdentity:
          clusterLocation: {{ .Values.externalSecrets.clusterLocation | required "externalSecrets.clusterLocation is required (e.g. us-central1) — needed by ESO's Workload Identity resolver." | quote }}
          clusterName: {{ .Values.externalSecrets.clusterName | required "externalSecrets.clusterName is required (e.g. automend-dev)." | quote }}
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "automend.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "automend.labels" . | nindent 4 }}
spec:
  # Refresh interval — ESO re-reads from GCP and updates the k8s Secret on
  # this cadence. 1m is snappy enough to pick up rotations + Cloud SQL
  # password updates without hammering the SM API.
  refreshInterval: 1m
  secretStoreRef:
    name: {{ include "automend.fullname" . }}-gcpsm
    kind: ClusterSecretStore
  target:
    # The Deployments' envFrom references `automend-secrets` (matches the
    # helm-managed Secret name when `secrets.create: true`). We KEEP that
    # name so the chart templates need no changes beyond this file.
    name: {{ include "automend.secretName" . }}
    creationPolicy: Owner
  data:
    # Core credentials — all materialized into env vars via envFrom.
    - secretKey: AUTOMEND_JWT_SECRET
      remoteRef:
        key: {{ printf "%s-jwt-secret" $prefix | quote }}
    - secretKey: AUTOMEND_POSTGRES_PASSWORD
      remoteRef:
        key: {{ $cloudsqlPasswordSecret | quote }}
    - secretKey: AUTOMEND_REDIS_PASSWORD
      remoteRef:
        key: {{ $redisAuthSecret | quote }}
    - secretKey: AUTOMEND_ARCHITECT_API_KEY
      remoteRef:
        key: {{ printf "%s-architect-api-key" $prefix | quote }}
    - secretKey: AUTOMEND_EMBEDDING_API_KEY
      remoteRef:
        key: {{ printf "%s-embedding-api-key" $prefix | quote }}
    - secretKey: AUTOMEND_SLACK_WEBHOOK_URL
      remoteRef:
        key: {{ printf "%s-slack-webhook-url" $prefix | quote }}
    - secretKey: AUTOMEND_SLACK_BOT_TOKEN
      remoteRef:
        key: {{ printf "%s-slack-bot-token" $prefix | quote }}
    - secretKey: AUTOMEND_PAGERDUTY_API_KEY
      remoteRef:
        key: {{ printf "%s-pagerduty-api-key" $prefix | quote }}
    - secretKey: AUTOMEND_JIRA_API_TOKEN
      remoteRef:
        key: {{ printf "%s-jira-api-token" $prefix | quote }}
{{- end }}
