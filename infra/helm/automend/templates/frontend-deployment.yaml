{{- if .Values.frontend.enabled }}
{{- $component := "frontend" -}}
{{- $fullname := include "automend.componentFullname" (dict "ctx" . "component" $component) -}}
{{- /*
     API_PROXY_TARGET is BAKED IN at `docker build` time via build-arg — the
     runtime env var below has no effect on rewrites (Next.js standalone
     serializes them at build time). We still emit the env var for debugging
     / observability; if you need a different proxy target, rebuild the
     frontend image with `--build-arg API_PROXY_TARGET=<url>`.
*/ -}}
{{- $apiProxy := .Values.frontend.apiProxyTarget | default (include "automend.apiServiceUrl" .) -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}
  labels:
    {{- include "automend.componentLabels" (dict "ctx" . "component" $component) | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  selector:
    matchLabels:
      {{- include "automend.componentSelectorLabels" (dict "ctx" . "component" $component) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "automend.componentLabels" (dict "ctx" . "component" $component) | nindent 8 }}
      {{- with .Values.frontend.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      enableServiceLinks: false   # avoid AUTOMEND_*_PORT env clobbering pydantic-settings
      serviceAccountName: {{ include "automend.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.frontend.podSecurityContext | nindent 8 }}
      containers:
        - name: frontend
          image: {{ include "automend.image" (dict "ctx" . "component" .Values.frontend) }}
          imagePullPolicy: {{ include "automend.imagePullPolicy" (dict "ctx" . "component" .Values.frontend) }}
          securityContext:
            {{- toYaml .Values.frontend.containerSecurityContext | nindent 12 }}
          # Uses the Dockerfile.frontend default CMD (node server.js)
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: API_PROXY_TARGET
              value: {{ $apiProxy | quote }}
            {{- with .Values.frontend.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          # Next.js doesn't ship a /health route; a TCP check is sufficient to
          # confirm the standalone server accepted a connection.
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
      {{- with .Values.frontend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.frontend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      affinity:
        {{- if .Values.frontend.affinity }}
        {{- toYaml .Values.frontend.affinity | nindent 8 }}
        {{- else }}
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    {{- include "automend.componentSelectorLabels" (dict "ctx" . "component" $component) | nindent 20 }}
        {{- end }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              {{- include "automend.componentSelectorLabels" (dict "ctx" . "component" $component) | nindent 14 }}
{{- end }}
