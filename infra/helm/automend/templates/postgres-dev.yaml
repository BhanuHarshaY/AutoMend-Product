{{- /*
    postgres-dev.yaml — local-dev Postgres (pgvector/pgvector image).
    NOT production-grade. See DECISION-024 for rationale. Production deploys
    flip postgres.enabled=false and point at managed Cloud SQL via external.*.

    The initdb ConfigMap creates two auxiliary databases (`temporal` and
    `temporal_visibility`) alongside the default AUTOMEND db so the in-cluster
    Temporal auto-setup can use this Postgres as its persistence backend
    (see temporal-dev.yaml). Runs only on first boot — if the PVC already has
    data, Postgres skips the init scripts entirely.
*/ -}}
{{- if .Values.postgres.enabled -}}
{{- $component := "postgres" -}}
{{- $fullname := include "automend.componentFullname" (dict "ctx" . "component" $component) -}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $fullname }}-initdb
  labels:
    {{- include "automend.componentLabels" (dict "ctx" . "component" $component) | nindent 4 }}
data:
  01-temporal-dbs.sql: |
    -- Extra databases for Temporal (used when temporal.enabled=true and we
    -- point auto-setup at this Postgres instance).
    CREATE DATABASE temporal;
    CREATE DATABASE temporal_visibility;
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $fullname }}
  labels:
    {{- include "automend.componentLabels" (dict "ctx" . "component" $component) | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.postgres.persistence.size | quote }}
  {{- with .Values.postgres.persistence.storageClassName }}
  storageClassName: {{ . | quote }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}
  labels:
    {{- include "automend.componentLabels" (dict "ctx" . "component" $component) | nindent 4 }}
spec:
  type: {{ .Values.postgres.service.type }}
  ports:
    - name: postgres
      port: {{ .Values.postgres.service.port }}
      targetPort: postgres
      protocol: TCP
  selector:
    {{- include "automend.componentSelectorLabels" (dict "ctx" . "component" $component) | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}
  labels:
    {{- include "automend.componentLabels" (dict "ctx" . "component" $component) | nindent 4 }}
spec:
  replicas: 1                # single-instance dev DB; not for prod
  strategy:
    type: Recreate           # can't rolling-update a PVC-attached pod
  selector:
    matchLabels:
      {{- include "automend.componentSelectorLabels" (dict "ctx" . "component" $component) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "automend.componentLabels" (dict "ctx" . "component" $component) | nindent 8 }}
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy | default .Values.global.imagePullPolicy }}
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              value: {{ .Values.external.postgres.user | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.external.postgres.database | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "automend.secretName" . }}
                  key: AUTOMEND_POSTGRES_PASSWORD
            # Keep pg_data in a subdir so the image's own initialization can
            # cohabit with the PVC mount (the official postgres entrypoint
            # complains when PGDATA is the mount root).
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.external.postgres.user | quote }}
                - -d
                - {{ .Values.external.postgres.database | quote }}
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.external.postgres.user | quote }}
                - -d
                - {{ .Values.external.postgres.database | quote }}
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ $fullname }}
        - name: initdb
          configMap:
            name: {{ $fullname }}-initdb
{{- end -}}
