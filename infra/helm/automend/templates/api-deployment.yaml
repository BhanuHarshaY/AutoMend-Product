{{- if .Values.api.enabled }}
{{- $component := "api" -}}
{{- $fullname := include "automend.componentFullname" (dict "ctx" . "component" $component) -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}
  labels:
    {{- include "automend.componentLabels" (dict "ctx" . "component" $component) | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  selector:
    matchLabels:
      {{- include "automend.componentSelectorLabels" (dict "ctx" . "component" $component) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "automend.componentLabels" (dict "ctx" . "component" $component) | nindent 8 }}
      {{- with .Values.api.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      # Disable k8s service env injection — `AUTOMEND_API_PORT` etc. would
      # otherwise clobber the backend's pydantic-settings values with k8s
      # service URLs (e.g. AUTOMEND_API_PORT=tcp://10.96.x.y:8000 fails
      # int parsing on api_port). Use DNS (automend-api.automend.svc) for
      # service discovery instead.
      enableServiceLinks: false
      serviceAccountName: {{ include "automend.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.api.podSecurityContext | nindent 8 }}
      {{- /*
          Architect model pull initContainer — same pattern as classifier
          (see classifier-deployment.yaml). When `modelStorage.enabled` and
          an `architect` component is declared, pulls `gs://BUCKET/PREFIX/`
          into an emptyDir mounted at `mountPath` in the api container.
          Current architect path is Gemini API so these weights aren't
          consumed yet — the plumbing is here for the future switch to a
          local Qwen-backed architect.
      */}}
      {{- $cfg := (.Values.modelStorage | default dict) -}}
      {{- $comp := (dict) -}}
      {{- if and $cfg.enabled $cfg.components }}
      {{- $comp = (default dict $cfg.components.architect) -}}
      {{- end }}
      {{- if and $cfg.enabled $cfg.bucket $comp.prefix }}
      initContainers:
        - name: fetch-models
          image: google/cloud-sdk:slim
          command:
            - sh
            - -c
            - |
              set -e
              echo "Fetching architect models from gs://{{ $cfg.bucket }}/{{ $comp.prefix }}/ …"
              mkdir -p {{ $comp.mountPath }}
              gcloud storage cp -r "gs://{{ $cfg.bucket }}/{{ $comp.prefix }}/*" "{{ $comp.mountPath }}/" || {
                echo "No objects found at gs://{{ $cfg.bucket }}/{{ $comp.prefix }}/ — continuing (architect still resolves to Gemini or local proxy via AUTOMEND_ARCHITECT_*)"
              }
              echo "Populated {{ $comp.mountPath }}:"
              ls -la {{ $comp.mountPath }} || true
          volumeMounts:
            - name: models
              mountPath: {{ $comp.mountPath }}
      {{- end }}
      containers:
        - name: api
          image: {{ include "automend.image" (dict "ctx" . "component" .Values.api) }}
          imagePullPolicy: {{ include "automend.imagePullPolicy" (dict "ctx" . "component" .Values.api) }}
          securityContext:
            {{- toYaml .Values.api.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "automend.configMapName" . }}
            - secretRef:
                name: {{ include "automend.secretName" . }}
          {{- if and $cfg.enabled $cfg.bucket $comp.prefix }}
          volumeMounts:
            - name: models
              mountPath: {{ $comp.mountPath }}
              readOnly: true
          env:
            - name: ARCHITECT_MODEL_DIR
              value: {{ $comp.mountPath | quote }}
            {{- with .Values.api.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- else }}
          {{- with .Values.api.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      {{- if and $cfg.enabled $cfg.bucket $comp.prefix }}
      volumes:
        - name: models
          emptyDir:
            # Qwen-2.5-0.5B ≈ 1 GB; bump for 7B variants.
            sizeLimit: 20Gi
      {{- end }}
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      affinity:
        {{- if .Values.api.affinity }}
        {{- toYaml .Values.api.affinity | nindent 8 }}
        {{- else }}
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    {{- include "automend.componentSelectorLabels" (dict "ctx" . "component" $component) | nindent 20 }}
        {{- end }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              {{- include "automend.componentSelectorLabels" (dict "ctx" . "component" $component) | nindent 14 }}
{{- end }}
