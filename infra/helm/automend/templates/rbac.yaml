{{- /*
RBAC for the app ServiceAccount.

Renders one or both of:
  - A ClusterRole + ClusterRoleBinding when `.Values.rbac.clusterWide` is true.
    Covers deployments / deployments/scale / pods / pods/log cluster-wide
    plus get/list/watch on namespaces (the latter is the foundation for
    Task 11.8b's `GET /api/clusters/default/namespaces` endpoint).
  - One Role + RoleBinding per entry in `.Values.rbac.targetNamespaces`,
    each scoped to that namespace and granting the same deployment + pod
    verbs. Use this when you want namespace-scoped access without
    cluster-wide visibility.

Both flags default off / empty, so production deploys (values.yaml) opt in
explicitly. values-local.yaml turns on both because the local dev loop needs
cluster-wide namespace-list for the clusters API.
*/ -}}

{{- if .Values.rbac.clusterWide }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "automend.fullname" . }}
  labels:
    {{- include "automend.labels" . | nindent 4 }}
rules:
- apiGroups: ["apps"]
  resources: ["deployments", "deployments/scale"]
  verbs: ["get", "list", "watch", "patch", "update"]
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "automend.fullname" . }}
  labels:
    {{- include "automend.labels" . | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: {{ include "automend.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "automend.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}

{{- range $ns := .Values.rbac.targetNamespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "automend.fullname" $ }}
  namespace: {{ $ns }}
  labels:
    {{- include "automend.labels" $ | nindent 4 }}
rules:
- apiGroups: ["apps"]
  resources: ["deployments", "deployments/scale"]
  verbs: ["get", "list", "watch", "patch", "update"]
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "automend.fullname" $ }}
  namespace: {{ $ns }}
  labels:
    {{- include "automend.labels" $ | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: {{ include "automend.serviceAccountName" $ }}
  namespace: {{ $.Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "automend.fullname" $ }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
