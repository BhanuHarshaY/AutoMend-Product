{{- if .Values.ingress.enabled -}}
{{- $fullname := include "automend.fullname" . -}}
{{- $apiSvc      := include "automend.componentFullname" (dict "ctx" . "component" "api") -}}
{{- $frontendSvc := include "automend.componentFullname" (dict "ctx" . "component" "frontend") -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullname }}
  labels:
    {{- include "automend.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # /api must come before / so nginx / GCLB route API traffic to the
          # API service, not the frontend. pathType: Prefix gives longest-
          # match semantics on nginx and preserves order on GCLB.
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ $apiSvc }}
                port:
                  number: {{ .Values.api.service.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $frontendSvc }}
                port:
                  number: {{ .Values.frontend.service.port }}
{{- end -}}
