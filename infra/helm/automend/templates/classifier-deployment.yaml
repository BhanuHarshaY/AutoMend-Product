{{- if .Values.classifier.enabled }}
{{- $component := "classifier" -}}
{{- $fullname := include "automend.componentFullname" (dict "ctx" . "component" $component) -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}
  labels:
    {{- include "automend.componentLabels" (dict "ctx" . "component" $component) | nindent 4 }}
spec:
  replicas: {{ .Values.classifier.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  selector:
    matchLabels:
      {{- include "automend.componentSelectorLabels" (dict "ctx" . "component" $component) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "automend.componentLabels" (dict "ctx" . "component" $component) | nindent 8 }}
      {{- with .Values.classifier.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      enableServiceLinks: false   # avoid AUTOMEND_*_PORT env clobbering pydantic-settings
      serviceAccountName: {{ include "automend.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.classifier.podSecurityContext | nindent 8 }}
      {{- /*
          Model pull initContainer (Phase 12 follow-up). When
          `modelStorage.enabled` and a `classifier` component is declared,
          we mount an emptyDir at the component's mountPath and an
          initContainer runs `gcloud storage cp -r` to populate it before
          the main classifier container starts.
      */}}
      {{- $cfg := (.Values.modelStorage | default dict) -}}
      {{- $comp := (dict) -}}
      {{- if and $cfg.enabled $cfg.components }}
      {{- $comp = (default dict $cfg.components.classifier) -}}
      {{- end }}
      {{- if and $cfg.enabled $cfg.bucket $comp.prefix }}
      initContainers:
        - name: fetch-models
          # google/cloud-sdk ships a small image with `gcloud storage`. Pod
          # inherits Workload Identity from the app ServiceAccount, which
          # has `storage.objectViewer` on the bucket (granted by the
          # `model-storage` Terraform module).
          image: google/cloud-sdk:slim
          command:
            - sh
            - -c
            - |
              set -e
              echo "Fetching classifier models from gs://{{ $cfg.bucket }}/{{ $comp.prefix }}/ …"
              mkdir -p {{ $comp.mountPath }}
              gcloud storage cp -r "gs://{{ $cfg.bucket }}/{{ $comp.prefix }}/*" "{{ $comp.mountPath }}/" || {
                echo "No objects found at gs://{{ $cfg.bucket }}/{{ $comp.prefix }}/ — continuing with empty dir (classifier falls back to regex stub)"
              }
              echo "Populated {{ $comp.mountPath }}:"
              ls -la {{ $comp.mountPath }} || true
          volumeMounts:
            - name: models
              mountPath: {{ $comp.mountPath }}
      {{- end }}
      containers:
        - name: classifier
          image: {{ include "automend.image" (dict "ctx" . "component" .Values.classifier) }}
          imagePullPolicy: {{ include "automend.imagePullPolicy" (dict "ctx" . "component" .Values.classifier) }}
          securityContext:
            {{- toYaml .Values.classifier.containerSecurityContext | nindent 12 }}
          command:
            {{- toYaml .Values.classifier.command | nindent 12 }}
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "automend.configMapName" . }}
            - secretRef:
                name: {{ include "automend.secretName" . }}
          {{- if and $cfg.enabled $cfg.bucket $comp.prefix }}
          volumeMounts:
            - name: models
              mountPath: {{ $comp.mountPath }}
              readOnly: true
          env:
            - name: CLASSIFIER_MODEL_DIR
              value: {{ $comp.mountPath | quote }}
            {{- with .Values.classifier.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- else }}
          {{- with .Values.classifier.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.classifier.resources | nindent 12 }}
      {{- if and $cfg.enabled $cfg.bucket $comp.prefix }}
      volumes:
        - name: models
          emptyDir:
            # Classifier models are small (<1 GB for RoBERTa-base). For
            # 7B-class weights bump this or switch to a PVC.
            sizeLimit: 2Gi
      {{- end }}
      {{- with .Values.classifier.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.classifier.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      affinity:
        {{- if .Values.classifier.affinity }}
        {{- toYaml .Values.classifier.affinity | nindent 8 }}
        {{- else }}
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    {{- include "automend.componentSelectorLabels" (dict "ctx" . "component" $component) | nindent 20 }}
        {{- end }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              {{- include "automend.componentSelectorLabels" (dict "ctx" . "component" $component) | nindent 14 }}
{{- end }}
