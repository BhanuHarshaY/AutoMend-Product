{{- if .Values.correlationWorker.enabled }}
{{- $component := "correlation-worker" -}}
{{- $fullname := include "automend.componentFullname" (dict "ctx" . "component" $component) -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}
  labels:
    {{- include "automend.componentLabels" (dict "ctx" . "component" $component) | nindent 4 }}
spec:
  replicas: {{ .Values.correlationWorker.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  selector:
    matchLabels:
      {{- include "automend.componentSelectorLabels" (dict "ctx" . "component" $component) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "automend.componentLabels" (dict "ctx" . "component" $component) | nindent 8 }}
      {{- with .Values.correlationWorker.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      enableServiceLinks: false   # avoid AUTOMEND_*_PORT env clobbering pydantic-settings
      serviceAccountName: {{ include "automend.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.correlationWorker.podSecurityContext | nindent 8 }}
      containers:
        - name: worker
          image: {{ include "automend.image" (dict "ctx" . "component" .Values.correlationWorker) }}
          imagePullPolicy: {{ include "automend.imagePullPolicy" (dict "ctx" . "component" .Values.correlationWorker) }}
          securityContext:
            {{- toYaml .Values.correlationWorker.containerSecurityContext | nindent 12 }}
          command: ["python", "main_correlation_worker.py"]
          envFrom:
            - configMapRef:
                name: {{ include "automend.configMapName" . }}
            - secretRef:
                name: {{ include "automend.secretName" . }}
          {{- with .Values.correlationWorker.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.correlationWorker.resources | nindent 12 }}
      {{- with .Values.correlationWorker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.correlationWorker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      affinity:
        {{- if .Values.correlationWorker.affinity }}
        {{- toYaml .Values.correlationWorker.affinity | nindent 8 }}
        {{- else }}
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    {{- include "automend.componentSelectorLabels" (dict "ctx" . "component" $component) | nindent 20 }}
        {{- end }}
{{- end }}
