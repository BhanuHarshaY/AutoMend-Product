{{- if .Values.secrets.create -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "automend.secretName" . }}
  labels:
    {{- include "automend.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Values.secrets.values.* maps to the exact AUTOMEND_* env var names the
  # backend reads from Settings. Friendly-case keys in values.yaml are mapped
  # to SCREAMING_SNAKE env var names here so the outer values stay readable
  # without forcing env-var-shaped yaml keys on chart users.
  #
  # Optional fields (blank by default) are still emitted so envFrom gets a
  # consistent schema — the backend treats empty strings as "feature off".

  # ---- Auth ----
  AUTOMEND_JWT_SECRET: {{ required "secrets.values.jwtSecret is required when secrets.create=true" .Values.secrets.values.jwtSecret | quote }}

  # ---- Postgres ----
  AUTOMEND_POSTGRES_PASSWORD: {{ .Values.secrets.values.postgresPassword | default "" | quote }}

  # ---- Redis ----
  AUTOMEND_REDIS_PASSWORD: {{ .Values.secrets.values.redisPassword | default "" | quote }}

  # ---- Architect (Model 2) ----
  AUTOMEND_ARCHITECT_API_KEY: {{ .Values.secrets.values.architectApiKey | default "" | quote }}

  # ---- Embeddings ----
  AUTOMEND_EMBEDDING_API_KEY: {{ .Values.secrets.values.embeddingApiKey | default "" | quote }}

  # ---- Notifiers / ticketing (optional; empty = feature off) ----
  AUTOMEND_SLACK_WEBHOOK_URL: {{ .Values.secrets.values.slackWebhookUrl | default "" | quote }}
  AUTOMEND_SLACK_BOT_TOKEN: {{ .Values.secrets.values.slackBotToken | default "" | quote }}
  AUTOMEND_PAGERDUTY_API_KEY: {{ .Values.secrets.values.pagerDutyToken | default "" | quote }}
  AUTOMEND_JIRA_API_TOKEN: {{ .Values.secrets.values.jiraApiToken | default "" | quote }}
{{- end -}}
