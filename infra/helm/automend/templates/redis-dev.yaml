{{- /*
    redis-dev.yaml — local-dev Redis (redis:7-alpine).
    NOT production-grade. See DECISION-024. No persistence by default —
    state lost on pod restart, which is fine for a dev loop.
*/ -}}
{{- if .Values.redis.enabled -}}
{{- $component := "redis" -}}
{{- $fullname := include "automend.componentFullname" (dict "ctx" . "component" $component) -}}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}
  labels:
    {{- include "automend.componentLabels" (dict "ctx" . "component" $component) | nindent 4 }}
spec:
  type: {{ .Values.redis.service.type }}
  ports:
    - name: redis
      port: {{ .Values.redis.service.port }}
      targetPort: redis
      protocol: TCP
  selector:
    {{- include "automend.componentSelectorLabels" (dict "ctx" . "component" $component) | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}
  labels:
    {{- include "automend.componentLabels" (dict "ctx" . "component" $component) | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "automend.componentSelectorLabels" (dict "ctx" . "component" $component) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "automend.componentLabels" (dict "ctx" . "component" $component) | nindent 8 }}
    spec:
      containers:
        - name: redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          imagePullPolicy: {{ .Values.redis.image.pullPolicy | default .Values.global.imagePullPolicy }}
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          # redis:7-alpine's default CMD is `redis-server` — no auth enabled
          # in dev. Production uses Memorystore with TLS + auth (Task 12.4).
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
{{- end -}}
