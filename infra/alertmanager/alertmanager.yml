global:
  resolve_timeout: 5m

route:
  receiver: "automend-webhook"
  group_by: ["incident_type", "namespace", "service"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      group_wait: 10s
      receiver: "automend-webhook"

receivers:
  - name: "automend-webhook"
    webhook_configs:
      - url: "http://host.docker.internal:8000/api/webhooks/alertmanager"
        send_resolved: true
        max_alerts: 50

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "high"
    equal: ["namespace", "service"]
